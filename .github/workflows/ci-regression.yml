name: Regression CI

on:
  push:
    branches:
      - main
      - upstream-sync
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run focused regression tests
        run: pnpm test -- --runInBand tests/services/mcpService-smart-routing-group.test.ts tests/services/sseService.test.ts
